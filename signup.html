<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLU3Y | إنشاء حساب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a2463, #1e3a8a, #3b82f6, #60a5fa);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow-y: auto;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.12);
            border-radius: 50%;
            animation: floatUp 8s infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .glass-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            padding: 32px 24px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: cardEntry 0.8s cubic-bezier(0.2, 0.9, 0.4, 1);
        }
        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .glass-card h1 {
            text-align: center;
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        .glass-card .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            margin-bottom: 20px;
        }
        .glass-input {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            border-radius: 50px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            font-size: 14px;
            transition: all 0.4s;
            outline: none;
        }
        .glass-input:focus {
            background: rgba(255,255,255,0.12);
            border-color: rgba(59, 130, 246, 0.6);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.2);
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.4); }
        .glass-btn {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        }
        .glass-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.5);
        }
        .glass-btn:active { transform: scale(0.98); }
        .link-text {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        .link-text a {
            color: #93c5fd;
            text-decoration: none;
            font-weight: 600;
        }
        .error-msg {
            text-align: center;
            color: #fca5a5;
            font-size: 13px;
            margin-top: 10px;
            min-height: 20px;
        }
        
        /* أفاتار كارتونية */
        .avatar-section {
            text-align: center;
            margin-bottom: 16px;
        }
        .avatar-label {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-bottom: 12px;
            display: block;
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-height: 160px;
            overflow-y: auto;
            padding: 8px;
            background: rgba(255,255,255,0.04);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .avatar-grid::-webkit-scrollbar { width: 3px; }
        .avatar-grid::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.5); border-radius: 10px; }
        .avatar-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
            position: relative;
        }
        .avatar-option:hover {
            transform: scale(1.1);
            border-color: rgba(255,255,255,0.3);
        }
        .avatar-option.selected {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            transform: scale(1.1);
        }
        .avatar-option.selected::after {
            content: '✅';
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 12px;
        }
        .selected-avatar-preview {
            width: 80px;
            height: 80px;
            margin: 0 auto 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
            transition: all 0.5s;
        }
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: bounce 0.5s infinite alternate;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            to { transform: translateY(-8px); opacity: 0.5; }
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 12px 28px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="glass-card">
        <div class="logo-icon">💎</div>
        <h1>BLU3Y</h1>
        <p class="subtitle">اختر شخصيتك الكارتونية</p>
        
        <div class="avatar-section">
            <div class="selected-avatar-preview" id="selectedAvatarPreview">🎭</div>
            <span class="avatar-label" id="selectedAvatarName">اختر شخصية</span>
            <div class="avatar-grid" id="avatarGrid"></div>
        </div>
        
        <input type="text" id="regName" class="glass-input" placeholder="👤 اسم المستخدم">
        <input type="email" id="regEmail" class="glass-input" placeholder="📧 البريد الإلكتروني">
        <input type="password" id="regPass" class="glass-input" placeholder="🔒 كلمة المرور (6 أحرف)">
        
        <button class="glass-btn" onclick="register()">
            <span id="regBtnText">🚀 إنشاء حساب</span>
            <span id="regBtnLoader" style="display:none">
                <span class="loading-dots"><span></span><span></span><span></span></span>
            </span>
        </button>
        <div class="error-msg" id="regMsg"></div>
        <div class="link-text">
            لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const CARTOON_AVATARS = [{"name": "الأسد الشجاع", "emoji": "🦁", "color": "#FF6B35", "bg": "linear-gradient(135deg, #FF6B35, #FFD700)"}, {"name": "الأرنب الذكي", "emoji": "🐰", "color": "#00D2FF", "bg": "linear-gradient(135deg, #00D2FF, #3A7BD5)"}, {"name": "الثعلب الماكر", "emoji": "🦊", "color": "#FF4500", "bg": "linear-gradient(135deg, #FF4500, #FF8C00)"}, {"name": "الباندا اللطيف", "emoji": "🐼", "color": "#2C3E50", "bg": "linear-gradient(135deg, #2C3E50, #BDC3C7)"}, {"name": "القط المدهش", "emoji": "🐱", "color": "#8E44AD", "bg": "linear-gradient(135deg, #8E44AD, #3498DB)"}, {"name": "الدب القوي", "emoji": "🐻", "color": "#8B4513", "bg": "linear-gradient(135deg, #8B4513, #D2691E)"}, {"name": "النمر السريع", "emoji": "🐯", "color": "#FFA500", "bg": "linear-gradient(135deg, #FFA500, #FF0000)"}, {"name": "القرد المرح", "emoji": "🐵", "color": "#A0522D", "bg": "linear-gradient(135deg, #A0522D, #DEB887)"}, {"name": "الكلب الوفي", "emoji": "🐶", "color": "#D4A574", "bg": "linear-gradient(135deg, #D4A574, #8B6914)"}, {"name": "الحصان النبيل", "emoji": "🐴", "color": "#C0C0C0", "bg": "linear-gradient(135deg, #C0C0C0, #708090)"}, {"name": "التنين الأسطوري", "emoji": "🐲", "color": "#00FF00", "bg": "linear-gradient(135deg, #006400, #00FF00)"}, {"name": "وحيد القرن", "emoji": "🦄", "color": "#FF69B4", "bg": "linear-gradient(135deg, #FF69B4, #9B59B6)"}, {"name": "النسر الجريء", "emoji": "🦅", "color": "#FFFFFF", "bg": "linear-gradient(135deg, #8B0000, #FF6347)"}, {"name": "السلحفاة الحكيمة", "emoji": "🐢", "color": "#228B22", "bg": "linear-gradient(135deg, #228B22, #90EE90)"}, {"name": "الدولفين المرح", "emoji": "🐬", "color": "#1E90FF", "bg": "linear-gradient(135deg, #000080, #1E90FF)"}, {"name": "الفراشة الساحرة", "emoji": "🦋", "color": "#DA70D6", "bg": "linear-gradient(135deg, #DA70D6, #FF1493)"}, {"name": "البومة الذكية", "emoji": "🦉", "color": "#8B4513", "bg": "linear-gradient(135deg, #8B4513, #F4A460)"}, {"name": "التمساح القوي", "emoji": "🐊", "color": "#006400", "bg": "linear-gradient(135deg, #006400, #32CD32)"}, {"name": "الحوت الأزرق", "emoji": "🐋", "color": "#4169E1", "bg": "linear-gradient(135deg, #000080, #4169E1)"}, {"name": "الفيل العظيم", "emoji": "🐘", "color": "#808080", "bg": "linear-gradient(135deg, #808080, #A9A9A9)"}];
        let selectedAvatar = null;

        // جزيئات
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (Math.random() * 6 + 2) + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDuration = (Math.random() * 6 + 6) + 's';
                particle.style.animationDelay = Math.random() * 8 + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // عرض الأفاتارات
        function renderAvatars() {
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = '';
            CARTOON_AVATARS.forEach((avatar, index) => {
                const div = document.createElement('div');
                div.className = 'avatar-option';
                div.style.background = avatar.bg;
                div.innerHTML = avatar.emoji;
                div.title = avatar.name;
                div.onclick = () => selectAvatar(avatar, div);
                grid.appendChild(div);
            });
        }

        function selectAvatar(avatar, element) {
            document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
            element.classList.add('selected');
            selectedAvatar = avatar;
            document.getElementById('selectedAvatarPreview').innerHTML = avatar.emoji;
            document.getElementById('selectedAvatarPreview').style.background = avatar.bg;
            document.getElementById('selectedAvatarName').innerText = avatar.name;
        }

        renderAvatars();
        // اختيار عشوائي افتراضي
        const randomAvatar = CARTOON_AVATARS[Math.floor(Math.random() * CARTOON_AVATARS.length)];
        setTimeout(() => {
            const firstOption = document.querySelector('.avatar-option');
            if (firstOption) selectAvatar(randomAvatar, firstOption);
            document.querySelectorAll('.avatar-option').forEach((el, i) => {
                if (CARTOON_AVATARS[i].name === randomAvatar.name) selectAvatar(randomAvatar, el);
            });
        }, 300);

        // التسجيل
        async function register() {
            const username = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;
            const msg = document.getElementById('regMsg');
            const btnText = document.getElementById('regBtnText');
            const btnLoader = document.getElementById('regBtnLoader');

            if (!username || !email || !password) { msg.innerText = 'الرجاء ملء جميع الحقول'; return; }
            if (password.length < 6) { msg.innerText = '❌ كلمة المرور 6 أحرف على الأقل'; return; }
            if (!selectedAvatar) { msg.innerText = '❌ الرجاء اختيار شخصية كارتونية'; return; }

            btnText.style.display = 'none';
            btnLoader.style.display = 'inline';
            msg.innerText = '';

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                await db.ref(`users/${userCredential.user.uid}`).set({
                    username,
                    email,
                    bio: '',
                    avatarUrl: '',
                    coverColor: COVER_COLORS[Math.floor(Math.random() * COVER_COLORS.length)],
                    cartoonAvatar: {
                        emoji: selectedAvatar.emoji,
                        name: selectedAvatar.name,
                        bg: selectedAvatar.bg
                    },
                    followers: {},
                    following: {},
                    totalLikes: 0,
                    isVerified: false,
                    verifiedAt: null,
                    verifiedBy: null,
                    createdAt: Date.now()
                });
                window.location.href = 'index.html';
            } catch (error) {
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
                if (error.code === 'auth/email-already-in-use') msg.innerText = '❌ البريد الإلكتروني مستخدم بالفعل';
                else if (error.code === 'auth/weak-password') msg.innerText = '❌ كلمة المرور ضعيفة جداً';
                else msg.innerText = '❌ حدث خطأ، حاول مرة أخرى';
            }
        }

        const COVER_COLORS = ["linear-gradient(135deg, #0a2463, #1e3a8a, #3b82f6)", "linear-gradient(135deg, #1e3a8a, #3b82f6, #60a5fa)", "linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb)", "linear-gradient(135deg, #1e40af, #3b82f6, #93c5fd)", "linear-gradient(135deg, #172554, #2563eb, #60a5fa)"];

        document.querySelectorAll('.glass-input').forEach(input => {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') register();
            });
        });
    </script>
</body>
</html>
