<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>💎 CRYSTΔL | دخول</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            min-height:100vh;
            background:radial-gradient(ellipse at top, #1a1a2e, #0f0f1a, #000);
            display:flex;align-items:center;justify-content:center;
            font-family:'Segoe UI',sans-serif;overflow:hidden;
        }
        .bg-orb{
            position:fixed;border-radius:50%;filter:blur(130px);opacity:0.35;
            animation:orbFloat 20s infinite alternate;
        }
        .bg-orb:nth-child(1){width:400px;height:400px;background:#6366f1;top:-100px;left:-100px}
        .bg-orb:nth-child(2){width:350px;height:350px;background:#06b6d4;bottom:-100px;right:-100px;animation-delay:5s}
        .bg-orb:nth-child(3){width:300px;height:300px;background:#8b5cf6;top:50%;left:50%;animation-delay:10s}
        @keyframes orbFloat{0%{transform:translate(0,0) scale(1)}100%{transform:translate(50px,-50px) scale(1.3)}}
        .card{
            position:relative;z-index:1;width:90%;max-width:410px;
            background:rgba(255,255,255,0.03);
            backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
            border-radius:32px;padding:36px 24px;
            border:1px solid rgba(255,255,255,0.1);
            box-shadow:0 30px 70px rgba(0,0,0,0.5),inset 0 0 30px rgba(255,255,255,0.02);
            animation:fadeUp 0.8s ease;
        }
        @keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
        .logo{
            width:70px;height:70px;margin:0 auto 20px;
            background:linear-gradient(135deg, rgba(99,102,241,0.3), rgba(6,182,212,0.3));
            border-radius:20px;display:flex;align-items:center;justify-content:center;
            font-size:36px;border:1px solid rgba(255,255,255,0.15);
            box-shadow:0 15px 40px rgba(99,102,241,0.2);
        }
        h1{text-align:center;font-size:36px;font-weight:900;background:linear-gradient(to bottom, #fff, #a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
        .sub{text-align:center;color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:20px}
        .tabs{display:flex;gap:4px;background:rgba(255,255,255,0.04);border-radius:40px;padding:4px;margin-bottom:24px}
        .tab{flex:1;padding:12px;background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;border-radius:40px;font-size:14px;transition:all 0.3s;font-weight:500}
        .tab.active{background:linear-gradient(135deg, #6366f1, #06b6d4);color:#fff;box-shadow:0 8px 20px rgba(99,102,241,0.3)}
        .form{display:none;animation:fadeIn 0.4s ease}
        .form.active{display:block}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        input{
            width:100%;padding:15px 18px;margin:8px 0;
            border-radius:50px;background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.1);color:#fff;
            font-size:14px;outline:none;transition:all 0.4s;
        }
        input:focus{border-color:rgba(99,102,241,0.6);box-shadow:0 0 20px rgba(99,102,241,0.1);background:rgba(255,255,255,0.07)}
        input::placeholder{color:rgba(255,255,255,0.3)}
        button{
            width:100%;padding:15px;margin-top:18px;
            background:linear-gradient(135deg, #6366f1, #06b6d4);
            border:none;border-radius:50px;color:#fff;
            font-weight:bold;font-size:15px;cursor:pointer;
            box-shadow:0 10px 30px rgba(99,102,241,0.3);
            transition:all 0.3s;
        }
        button:hover{transform:translateY(-2px);box-shadow:0 20px 40px rgba(99,102,241,0.4)}
        button:active{transform:scale(0.97)}
        button:disabled{opacity:0.5;pointer-events:none}
        .msg{text-align:center;color:#fca5a5;font-size:13px;margin-top:12px;min-height:20px}
        .msg.success{color:#4ade80}
        .spinner-inline{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;margin-right:8px;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div>
    
    <div class="card">
        <div class="logo">💎</div>
        <h1>CRYSTΔL</h1>
        <p class="sub">TikTok 2026 Ultra Pro</p>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">دخول</button>
            <button class="tab" onclick="switchTab('register')">اشتراك</button>
        </div>
        
        <!-- نموذج تسجيل الدخول -->
        <div id="formLogin" class="form active">
            <input type="email" id="loginEmail" placeholder="📧 البريد الإلكتروني" autocomplete="email">
            <input type="password" id="loginPass" placeholder="🔒 كلمة المرور" autocomplete="current-password">
            <button id="btnLogin" onclick="doLogin()">🚀 تسجيل الدخول</button>
            <div class="msg" id="loginMsg"></div>
        </div>
        
        <!-- نموذج الاشتراك -->
        <div id="formRegister" class="form">
            <input type="text" id="regName" placeholder="👤 اسم المستخدم" autocomplete="username">
            <input type="email" id="regEmail" placeholder="📧 البريد الإلكتروني" autocomplete="email">
            <input type="password" id="regPass" placeholder="🔒 كلمة المرور (6 أحرف على الأقل)" autocomplete="new-password">
            <button id="btnRegister" onclick="doRegister()">🎨 إنشاء حساب</button>
            <div class="msg" id="regMsg"></div>
        </div>
    </div>
    
    <script src="firebase-config.js"></script>
    <script>
        // ========== تبديل التبويبات - تم التصحيح ✅ ==========
        function switchTab(type){
            // إزالة active من كل التبويبات
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            // إضافة active للتبويب المضغوط
            event.target.classList.add('active');
            
            // إخفاء كل النماذج
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            // إظهار النموذج المطلوب
            if(type === 'login'){
                document.getElementById('formLogin').classList.add('active');
            } else {
                document.getElementById('formRegister').classList.add('active');
            }
            
            // مسح الرسائل السابقة
            document.getElementById('loginMsg').innerText = '';
            document.getElementById('regMsg').innerText = '';
        }
        
        // ========== تسجيل الدخول ✅ ==========
        async function doLogin(){
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPass').value;
            const msg = document.getElementById('loginMsg');
            const btn = document.getElementById('btnLogin');
            
            if(!email || !password){
                msg.innerText = '❌ الرجاء ملء جميع الحقول';
                return;
            }
            
            msg.innerText = '';
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-inline"></span> جاري الدخول...';
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                console.log('✅ تسجيل دخول ناجح');
                window.location.replace('index.html');
            } catch(error) {
                console.error('Login error:', error.code);
                btn.disabled = false;
                btn.innerHTML = '🚀 تسجيل الدخول';
                
                switch(error.code) {
                    case 'auth/user-not-found':
                        msg.innerText = '❌ لا يوجد حساب بهذا البريد';
                        break;
                    case 'auth/wrong-password':
                        msg.innerText = '❌ كلمة المرور غير صحيحة';
                        break;
                    case 'auth/invalid-email':
                        msg.innerText = '❌ بريد إلكتروني غير صالح';
                        break;
                    case 'auth/invalid-credential':
                        msg.innerText = '❌ بيانات الدخول غير صحيحة';
                        break;
                    case 'auth/too-many-requests':
                        msg.innerText = '❌ محاولات كثيرة، حاول لاحقاً';
                        break;
                    default:
                        msg.innerText = '❌ خطأ: ' + error.message;
                }
            }
        }
        
        // ========== الاشتراك ✅ ==========
        async function doRegister(){
            const username = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPass').value;
            const msg = document.getElementById('regMsg');
            const btn = document.getElementById('btnRegister');
            
            if(!username || !email || !password){
                msg.innerText = '❌ الرجاء ملء جميع الحقول';
                return;
            }
            
            if(username.length < 3){
                msg.innerText = '❌ اسم المستخدم 3 أحرف على الأقل';
                return;
            }
            
            if(password.length < 6){
                msg.innerText = '❌ كلمة المرور 6 أحرف على الأقل';
                return;
            }
            
            if(!email.includes('@') || !email.includes('.')){
                msg.innerText = '❌ بريد إلكتروني غير صالح';
                return;
            }
            
            msg.innerText = '';
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-inline"></span> جاري الإنشاء...';
            
            try {
                // الخطوة 1: إنشاء حساب المصادقة
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const uid = userCredential.user.uid;
                console.log('✅ Auth created:', uid);
                
                // الخطوة 2: تجهيز البيانات
                const avatarUrl = DICEBEAR_URL + '?seed=' + uid;
                const coverColor = COVER_COLORS[Math.floor(Math.random() * COVER_COLORS.length)];
                
                const userData = {
                    username: username,
                    email: email,
                    bio: '',
                    avatarUrl: avatarUrl,
                    hasCustomAvatar: false,
                    coverColor: coverColor,
                    followers: {},
                    following: {},
                    totalLikes: 0,
                    isVerified: false,
                    verifiedAt: null,
                    verifiedBy: null,
                    createdAt: Date.now()
                };
                
                // الخطوة 3: حفظ في قاعدة البيانات
                await db.ref('users/' + uid).set(userData);
                console.log('✅ User data saved');
                
                // الخطوة 4: نجاح
                msg.innerText = '✅ تم إنشاء الحساب بنجاح!';
                msg.className = 'msg success';
                
                setTimeout(() => {
                    window.location.replace('index.html');
                }, 800);
                
            } catch(error) {
                console.error('Register error:', error.code);
                btn.disabled = false;
                btn.innerHTML = '🎨 إنشاء حساب';
                msg.className = 'msg';
                
                switch(error.code) {
                    case 'auth/email-already-in-use':
                        msg.innerText = '❌ البريد الإلكتروني مستخدم بالفعل';
                        break;
                    case 'auth/weak-password':
                        msg.innerText = '❌ كلمة المرور ضعيفة جداً';
                        break;
                    case 'auth/invalid-email':
                        msg.innerText = '❌ بريد إلكتروني غير صالح';
                        break;
                    case 'auth/operation-not-allowed':
                        msg.innerText = '❌ التسجيل غير مفعل، راجع إعدادات Firebase';
                        break;
                    default:
                        msg.innerText = '❌ خطأ: ' + (error.message || 'غير معروف');
                }
            }
        }
        
        // ========== زر Enter للسرعة ⚡ ==========
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keydown', function(e) {
                if(e.key === 'Enter') {
                    e.preventDefault();
                    if(document.getElementById('formLogin').classList.contains('active')) {
                        doLogin();
                    } else {
                        doRegister();
                    }
                }
            });
        });
        
        // ========== إذا المستخدم مسجل مسبقاً ==========
        auth.onAuthStateChanged(user => {
            if(user) {
                console.log('🟢 مستخدم مسجل مسبقاً، توجيه للرئيسية');
                window.location.replace('index.html');
            }
        });
        
        console.log('💎 CRYSTΔL Auth Ready ✅');
    </script>
</body>
</html>
